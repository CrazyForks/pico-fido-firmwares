name: pico-fido-firmwares matrix build

on:
  workflow_dispatch:
    inputs:
      releaseTag:
        type: string
        description: Tag used at release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: librekeys-nixos-x64-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Matrix compile
        run: nix build .#pico-fido-firmwares

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.releaseTag }}
          files: result/share/pico-fido/*
          make_latest: true
